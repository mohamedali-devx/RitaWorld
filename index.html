<!DOCTYPE html>
<html>

<head>
    <title>Rita's World</title>
    <link rel="stylesheet" href="home.css">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Rita's World</h1>
        <p>Rita said I couldn't, so I built this website from scratch without using any AI.
            In your face, Rita.</p>
    </header>
    <main class="container">
        <section class="clothes" id="contClothes">
            <div class="cards" id="cards"></div>
        </section>
        <section class="outfits" id="contOutfits">
            <div class="current-outfit" id="currentOutfit">
                <div class="pos ras">
                    <div style="text-align: center;">head</div>
                </div>
                <div class="pos chest">
                    <div style="text-align: center;">chest</div>
                </div>
                <div class="pos legs">
                    <div style="text-align: center;">legs</div>
                </div>
                <div class="pos feet">
                    <div style="text-align: center;">feet</div>
                </div>
            </div>
        </section>

    </main>

    <div class="bottom">
        <nav class="bottom-nav">
            <a href="#" id="clothes" class="active">Clothes</a>
            <a href="#" id="outfit">Outfit</a>
        </nav>
        <div class="settings" id="settingsBtns">
            <a href="#" id="sort">Sort</a>
            <a href="#" class="active" id="random">Random</a>
        </div>
        <div class="settings outfit-Btns" id="outfitBtns">
            <a href="#" id="sorting">Sort</a>
            <a href="#" class="active" id="clearOutfit">Clear</a>
            <a href="#" id="randomOutfit">Random</a>
        </div>
    </div>

    <!-- <footer>
        <p>&copy; 2026 Rita's World. All rights reserved.</p>
        <p>Created by Mohamed Ali.</p>
    </footer> -->

    <script src="home.js" defer></script>
    <script src="bottom.js" defer></script>
</body>

</html>
